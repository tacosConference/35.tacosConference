[[events]]
date = "2026-05-22"
day = { de = "Freitag", en = "Friday" }
time = "09:40"
end = "10:10"
title = "The Unbelievable Universe of Unicode"
person = "Jakob Moser"
description = "Whenever a computer needs to store or process text, it represents it as a sequence of numbers. But how does that work? \n\nThis is where Unicode comes in. Given a character, Unicode encodes it into a number. The Unicode Consortium has an ambitious goal: It wants to be able to represent any character or sign there is in any writing system, making Unicode a truly universal standard.\n\nBut with such universality also come a few seemingly unbelievable things:\n\n- Why is len('👨🏾‍💻') == 4?\n- Why is amazon.de not the same as аmаzon.de?\n- What is Tofu and why is it bad?\n- And why is 'á' != 'á'?\n\nThis talk is an assortment of Unicode-related trivia, which might help you during your next project, or at least help you to gain a deeper appreciation for the complexity behind the seemingly mundane."
location = "Seminarraum 10"
color = "#00a0d7"

[[events]]
date = "2026-05-22"
day = { de = "Freitag", en = "Friday" }
time = "10:20"
end = "10:50"
title = "Protein LLMs: Applying NLP Methods to Protein Sequence Modeling"
person = "Elizaveta Dovedova, Artem Stetoi"
description = "Have you heard of protein bars? Protein coffee? Protein nachos? How about protein LLMs?\nProteins are linear chains of amino acids that can be represented as sequences over a fixed alphabet. This makes them resemble natural language in a surprisingly useful way, and many NLP algorithms are directly applicable to modeling protein sequences. Capturing patterns in amino-acid sequences and linking those patterns to biological properties lets you predict protein behavior, infer their structure and function, and design them for specific applications—a computational task that would otherwise require extensive laboratory work. Starting with n-grams, the application of methods original to NLP in computational biology has been studied for many years, leading to the recent emergence of protein-specific large language models (Protein LLMs).\n\nWith my presentation, I would to introduce coli students with no biological background to how their knowledge of NLP concepts and techniques—such as embeddings, transformers or masked language modeling—can be applied in the biological field."
location = "Seminarraum 10"
color = "#00a0d7"

[[events]]
date = "2026-05-22"
day = { de = "Freitag", en = "Friday" }
time = "16:30"
end = "17:00"
title = "Social Impact of AI"
person = "Maya Arseven, Polina Kuznetcova"
description = "Are we, as computational linguists, doomed in the job market? Are we all going to be replaced by AI? Or, on the contrary, are we the luckiest generation of all?\n\nIn this talk, we will explore how AI impacts the balance between creating new jobs and replacing existing ones. From recruiting to AI usage in the workplace, we will discuss the pros and cons of integrating AI into our daily work lives. Finally, we will look at how AI replaceability is calculated and what metrics are used to measure how AI-proof a job is."
location = "Konferenzraum 5/104"
color = "#00a0d7"

[[events]]
date = "2026-05-22"
day = { de = "Freitag", en = "Friday" }
time = "17:05"
end = "17:35"
title = "Is Computational Linguistics dead? - An exploratory survey on CL job market across China and Europe"
person = "Ran Li"
description = "This talk presents a small exploratory study of the current job market for computational linguistics and AI-related positions across China and Europe. Instead of focusing on a single company or sector, the project aims to collect and analyze publicly available job postings using web scraping methods. The goal is to gain a data-driven overview of where relevant positions are located, what skills are most frequently required, and how different roles are described.\n\nAfter collecting job descriptions from major recruitment platforms(LinkedIn, Boss， 51 Jobs), major AI companies(Open AI, Google, Tencent, ByteDance, Baidu, Alibaba) and traditional enterprises seeking digital transformation, the data will be cleaned and analyzed to identify patterns in required competencies, such as NLP techniques, machine learning frameworks, LLM-related tasks, and engineering skills. Positions will be roughly categorized into several types, including data-focused roles, model training and fine-tuning, evaluation and alignment, and product-oriented NLP applications. The results will be visualized as a map showing geographical distribution, along with charts summarizing skill demand and role characteristics.\n\nThis project is both a methodological exercise in simple large-scale text collection and analysis, and a practical attempt to better understand the landscape of career paths in computational linguistics. The talk will share preliminary findings and reflect on how job descriptions shape our understanding of the field."
location = "Konferenzraum 5/104"
color = "#00a0d7"

[[events]]
date = "2026-05-22"
day = { de = "Freitag", en = "Friday" }
time = "09:40"
end = "10:10"
title = "A Dual-Track Theory of Local Discourse Coherence in Humans and Language Models"
person = "Souvik Banerjee"
description = "What makes a sequence of sentences feel coherent rather than disjointed? At the local level, psycholinguistic and computational evidence points to two distinct mechanisms operating simultaneously. Relational coherence tracks how adjacent sentences are logically connected: whether one explains, contrasts, or elaborates on the other. Entity coherence tracks which referents are in focus and how attention shifts between them. These two tracks are not independent: the type of relation between sentences shapes which entities stay in focus, and the entity configuration constrains which relations are plausible.  Despite decades of work on each track in isolation, we lack a unified formal account of how they interact.\n\nWe develop an information-theoretic framework that models both tracks jointly. At each word in a text, a reader maintains and updates beliefs about the discourse relation currently being constructed.  We validate this model against human reading times. We then ask whether LLMs implement a similar dual-track structure internally using targeted interventions on model activations. We test whether relational and entity coherence are encoded in separable regions of the model's representation space, and whether they interact in the ways our theory predicts. This lets us ask: do LLMs solve discourse coherence the same way humans do, or do they find a fundamentally different solution?"
location = "Seminarraum 11"
color = "#00a0d7"

[[events]]
date = "2026-05-22"
day = { de = "Freitag", en = "Friday" }
time = "10:20"
end = "10:50"
short_title = "Do AI Models Judge Like Humans?"
title = "Do AI Models Judge Like Humans? Generalization in German Ditransitive Constructions Across Native Speakers, L2 Learners, and Large Language Models"
person = "Xinyu Jing"
description = "Ziel der vorliegenden Studie ist es, die Generalisierungsfähigkeit fortgeschrittener Deutschlernender mit chinesischer Erstsprache im Bereich der ditransitiven Konstruktion zu untersuchen und dabei Modelle der künstlichen Intelligenz als Vergleichsinstanz einzubeziehen, um Unterschiede zwischen menschlichen und maschinellen Urteilen hinsichtlich syntaktischer und semantischer Akzeptabilität zu analysieren. Zu diesem Zweck wurde ein Akzeptabilitätsurteilsexperiment durchgeführt, an dem deutsche Muttersprachler, fortgeschrittene Deutschlernende mit chinesischer Erstsprache sowie zwei große Sprachmodelle (DeepSeek und ChatGPT) teilnahmen, die eine Reihe von grammatisch konformen und nicht konformen ditransitiven Sätzen bewerten sollten.\n\nDas Versuchsmaterial wurde systematisch im Hinblick auf Verbklassen und die Kompatibilität zwischen Verb und Konstruktion variiert und umfasste sowohl prototypische ditransitive Verben als auch randständige Verben sowie Konstruktionen, die gegen syntaktische oder semantische Beschränkungen verstoßen. Durch den Vergleich der Bewertungen der drei Gruppen werden Fehlermuster in der Generalisierung bei Zweitsprachlern identifiziert und Unterschiede zu Muttersprachlern aufgezeigt. Gleichzeitig wird die Leistungsfähigkeit künstlicher Intelligenz in solchen sprachlichen Urteilsaufgaben evaluiert.\n\nDie Ergebnisse lassen erwarten, dass Deutschlernende mit chinesischer Erstsprache bei der Bewertung nicht konformer Konstruktionen toleranter sind als Muttersprachler und eine Tendenz zur Übergeneralisierung zeigen. Die Sprachmodelle weisen insgesamt ein ähnliches Bewertungsmuster wie Muttersprachler auf, zeigen jedoch unter bestimmten semantischen Bedingungen Instabilitäten bzw. eine stärkere Orientierung an oberflächlichen Strukturen."
location = "Seminarraum 11"
color = "#00a0d7"

