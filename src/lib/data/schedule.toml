[[events]]
date = "2026-05-21"
day = { de = "Donnerstag", en = "Thursday" }
time = "10:15"
end = "10:45"
title = "Graph Language Models"
person = "Moritz Plenz"
description = "While Language Models (LMs) are the workhorses of NLP, their interplay with structured knowledge graphs (KGs) is still actively researched. Current methods for encoding such graphs typically either (i) linearize them for embedding with LMs – which underutilize structural information, or (ii) use Graph Neural Networks (GNNs) to preserve the graph structure – but GNNs cannot represent text features as well as pretrained LMs. In our work we introduce a novel LM type, the Graph Language Model (GLM), that integrates the strengths of both approaches and mitigates their weaknesses. The GLM parameters are initialized from a pretrained LM to enhance understanding of individual graph concepts and triplets. Simultaneously, we design the GLM’s architecture to incorporate graph biases, thereby promoting effective knowledge distribution within the graph. This enables GLMs to process graphs, texts, and interleaved inputs of both. Empirical evaluations on relation classification tasks show that GLM embeddings surpass both LM- and GNN-based baselines in supervised and zero-shot setting, demonstrating their versatility."
location = "Konferenzraum 5/104"
color = "#00a0d7"

[[events]]
date = "2026-05-21"
day = { de = "Donnerstag", en = "Thursday" }
time = "10:45"
end = "11:15"
title = "Embedding Collapse in Two-Tower News Recommendation"
person = "Martin Scheuermann"
description = "News recommendation is characterized by rapidly evolving content and highly skewed interaction data, making it challenging to learn robust user and article representations. While two-tower models are widely used for scalable retrieval, we show that they exhibit a critical failure mode in this setting: embedding collapse.\nWe demonstrate that user and article embeddings quickly degenerate into a low-dimensional structure, limiting retrieval performance and leading to an overemphasis on popular content. This collapse emerges early during training and constrains downstream performance.\nTo mitigate this issue, we propose and analyze spectral regularization, which encourages a more balanced use of the embedding space by preventing variance from concentrating in a few dominant directions. This leads to more stable training and improved recommendation quality."
location = "Konferenzraum 5/104"
color = "#00a0d7"


[[events]]
date = "2026-05-21"
day = { de = "Donnerstag", en = "Thursday" }
time = "11:15"
end = "12:15"
title = "Is This a Moral Claim? Humans vs. LLMs on a Surprisingly Difficult Task"
person = "Maria Becker"
description = "These days, almost everything seems to become a moral issue – from what we eat to how we travel, speak, or consume. In this talk, I focus on the role of moral values in public discourse, more specifically on their use in arguments about controversial issues. We refer to such arguments based on moral values as moralizations and examine how closely machines match human judgments in identifying them. Building on a theoretically grounded operationalization, we construct and annotate a diverse corpus of authentic texts to capture how moralization emerges in discourse. A key challenge is that identifying moralization is inherently subjective: even trained annotators do not always agree. This raises the question of whether large language models can learn such nuanced distinctions from data or from instructions alone. To address this, we compare different modeling strategies, including prompting and fine-tuning, and analyze how closely model predictions align with human judgments. Ultimately, the talk shows that identifying moralization is not just a technical challenge, but depends crucially on how we define, model, and interpret it."
location = "Konferenzraum 5/104"
color = "#5b2d90"

