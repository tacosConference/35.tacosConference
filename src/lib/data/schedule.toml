[[events]]
date = "2026-05-22"
day = { de = "Freitag", en = "Friday" }
time = "16:15"
end = "17:15"
title = "The cost of cutting corners"
person = "Mariia Neguliaeva"
description = "Real-life computational projects have a way of failing at the worst possible moment. This workshop stems from one such project on sign language translation, which sits at an intersection of linguistics, computer vision and accessibility technology - a real problem with real stakes, but most importantly a real appetite for computational resources. The gap between the project's ambitious beginning and considerably humbler reality is where the real work happens, as the value of defensive coding gradually replaces hopeful optimism. We'll explore that gap together through an interactive game (no spoilers!) and then discuss some tips on making large-scale computing bearable. What does it take to survive overnight crashes, while staying within budget? And how come we don't always do it? This session is for you, if you've ever been too scared to waste scarce resources or wondered why things go wrong when you seem to have done everything right. No prior experience with large-scale computing or sign language translation required. Curiosity and pent-up frustration welcome.\nNot validated by controlled studies, individual results may vary ;)"
location = "Konferenzraum 5/104"
color = "#008c3a"

