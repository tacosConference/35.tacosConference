[[events]]
date = "2026-05-22"
day = { de = "Freitag", en = "Friday" }
time = "09:40"
end = "10:10"
title = "Grokking Multilinguality: Ein mechanistischer Blick auf Cross-Lingual Generalization"
person = "Frederick Riemenschneider"
description = "Multilinguale Sprachmodelle teilen Wissen über Sprachgrenzen hinweg und scheinen dabei einen weitgehend sprachunabhängigen \"Konzept-Raum\" auszubilden, selbst wenn während des Trainings kein explizites cross-linguales Signal vorliegt.\nDoch unter welchen Bedingungen entsteht dieser Raum? Wann und wie vollzieht sich diese Generalisierung im Verlauf des Pre-Trainings? Wie lassen sich sprachspezifische und sprachagnostische Komponenten im Modell sauber voneinander trennen, und was sagt uns das über die Funktionsweise von Sprachmodellen?\nUm diesen Fragen nachzugehen, betrachten wir \"reale\" Sprachmodelle ebenso wie Toy-Modelle aus der Perspektive der Mechanistic Interpretability. Zunächst werfen wir einen Blick auf die Trainingsdynamik tatsächlicher Sprachmodelle, identifizieren \"multilinguale Bereiche\" und untersuchen, wann und wie sich diese im Training herausbilden. Anschließend wechseln wir in ein kontrolliertes Toy-Setup, das uns erlaubt, einzelne Mechanismen zu isolieren und gezielt zu untersuchen, um das minimale Setup zu finden, in dem cross-linguale Generalisierung überhaupt entsteht."
location = "Konferenzraum 5/104"
color = "#00a0d7"

[[events]]
date = "2026-05-22"
day = { de = "Freitag", en = "Friday" }
time = "10:20"
end = "10:50"
short_title = "The Levenshteins: Transparent methods applied to language learning of German orthography"
title = "The Levenshteins: A family of good ol' transparent methods applied to human language learning of German orthography"
person = "Nicolas Arnold"
description = "In computational linguistics, we enable computers to perform tasks in natural language processing and generation. Using such methods and models in the context of human language acquisition comes with its own set of challenges. In my interdisciplinary bachelor's thesis, I applied methods from computational linguistics to the didactical setting, modelling the phonetic plausibility of spelling errors by early language learners. The idea is quite simple: Given a misspelled word, let's predict its pronunciation and find candidate words in the lexicon that sound similar. What could possibly go wrong?\n\nI will point out some challenges and surprising failures of existing methods while addressing the following questions:\n\n- Does grapheme-based spelling correction really outperform phoneme-based ones?\n- Is there still a place for simple algorithms like Levenshtein distance, heuristics and rule-based approaches, or even linguistic theory in modern computational linguistics?\n- And eventually: Are we ready for learner language yet?\n\nThe spelling examples are in German. However, German skills are not needed to follow the talk. The talk is held in English.\n\n\nI used openly available tools like BAS Web Services [1] and epitran [2] for grapheme-to-phoneme (G2P) conversion, PHOIBLE [3] for phoneme inventories and phonetic features and took spelling errors from the Litkey-Corpus [4] for evaluation. \n\n[1]: https://clarin.phonetik.uni-muenchen.de/BASWebServices/interface/Grapheme2Phoneme\n[2]: https://github.com/dmort27/epitran\n[3]: https://phoible.org/\n[4]: https://www.linguistics.rub.de/litkeycorpus/"
location = "Konferenzraum 5/104"
color = "#00a0d7"

