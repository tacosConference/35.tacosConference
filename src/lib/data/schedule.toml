title = "Programming Language that Functions – Haskell for Computational Linguists"
person = "Pranav Singh"
description = "I'm sick of Python and I know you are too.\n\nWipe your memory of GPUs and stop Hugging Faces – instead, pay your attention towards functional programming: an explainable and elegant way to model structures and interactions in language. In this workshop, we'll learn the basics of Haskell, a language embraced by computational linguistics for years, and use it to model real linguistic phenomena (focusing on syntax, morphology, and phonology).\n\nFor linguists, this workshop will serve as practice in breaking down observed phenomena  into their implementation details, designing the right data structures, and manipulating them with the right algorithms. For computer scientists, this workshop will build the intuition to think functionally (foundational to other functional languages like OCaml and Scala) and add a new programming paradigm to your toolbox.\n\nAll code will be available on GitHub so that attendees can build these concepts further and use them for their own pet projects :)"
location = "Konferenzraum 5/104"
color = "#008c3a"

