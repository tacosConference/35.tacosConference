[[events]]
date = "2026-05-21"
day = { de = "Donnerstag", en = "Thursday" }
time = "10:40"
end = "11:10"
title = "Can Social Interaction Help Ground AI Storytelling Ability?"
person = "Long Le"
description = "Current methods in the automatic storytelling task often pay more attention to the plot structure aspect of stories, while neglecting the problem of representing character emotional development. From how emotion progression in stories generated by language models differs from that in human-written stories, we suggest that current methods are not enough to mitigate this difference. Through a narratology-informed perspective, we propose to solve this problem by learning from an interactive environment that can ground language models to human emotional experience. We show that behaviour cloning and multi-turn reinforcement learning in this dynamic setting can help models generate more human-like stories while still maintaining generalization performance."
location = "Konferenzraum 5/104"
color = "#00a0d7"

[[events]]
date = "2026-05-21"
day = { de = "Donnerstag", en = "Thursday" }
time = "11:20"
end = "11:50"
title = "Beyond Names: Tracing the Stylistic Influence of Canonical Texts in Fanfiction"
person = "Carina Zander, Denise Binz"
description = "This talk explores the extent to which canonical texts shape writing style in fanfiction. Drawing on a corpus of fanfictions from popular fandoms on Archive of Our Own, we investigate whether distinct stylistic traces persist beyond explicit references. To this end, we construct and compare two versions of the corpus: the original fanfiction texts as written by their authors, and a modified version in which fandom-specific proper names are removed using named entity recognition techniques.\n\nUsing machine learning classification, we assess how accurately texts can be attributed to their respective fandoms in both conditions. The comparison allows us to isolate the contribution of implicit stylistic features from that of overt lexical markers. The results provide insight into how deeply source material informs fanfiction writing, highlighting the extent to which fandom-specific style operates independently of identifiable names and entities."
location = "Konferenzraum 5/104"
color = "#00a0d7"

[[events]]
date = "2026-05-21"
day = { de = "Donnerstag", en = "Thursday" }
time = "13:45"
end = "14:45"
title = "Uncovering Political Rhetoric with Corpus Tools: A Hands-On Introduction to NoSketchEngine and ParlaMint"
person = "Isabell Furkert"
description = "Parliamentary debates are a good resource for studying political discourse - but analysing thousands of speeches by hand is impossible. This workshop serves as a hands-on introduction to NoSketchEngine, a free web-based corpus analysis platform provided by CLARIN, and a look into the ParlaMint dataset, a large, metadata-rich collection of parliamentary proceedings from 29 European parliaments. Together, these tools enable new possibilities for empirical, reproducible research into political language.\n\nParticipants will receive a guided walthrough of NoSketchEngine's core features - subcorpus creation and keyword analysis - illustrated with concrete examples.\n\nNo prior experience with corpus linguistics or programming required."
location = "Seminarraum 10"
color = "#008c3a"

[[events]]
date = "2026-05-21"
day = { de = "Donnerstag", en = "Thursday" }
time = "10:00"
end = "10:30"
title = "A statistical analysis of translation errors in machine translations."
person = "Cristina Gutiérrez Alcalá"
description = "This research examines if machine translations, even with notable progress recently, can provide the same level of exactness and correctness as human translators. AI tools like Google Translate, DeepL or ChatGPT are appreciated for their quickness and convenience, but they usually do not perform well in important aspects such as context related adaptation, cultural integration and style adjustment. This work suggests that these flaws underline the essential function of human translators while presenting Machine Translation more as an assisting tool instead of a replacement one. The research looks at different translations that are made by many tools for varied types of texts, such as technical, literary and legal ones. It finds usual mistakes - wrong use of terms, changes in style consistency, differences in culture among others - and checks their effect on proper comprehension of specific content. The outcomes were then compared with known translation rules to show the continuing gaps found in translations done by AI-based systems. Through examining the disparity across platforms and recognizing the mistakes repeating themselves, this dissertation seeks to present a detailed view on the boundaries of Machine Translation. The results endorse suggestions for using Machine Translation as an addition tool, highlighting the necessity of human supervision to guarantee accuracy, exactness, and relevance in culture when working on translations."
location = "Seminarraum 11"
color = "#00a0d7"

[[events]]
date = "2026-05-21"
day = { de = "Donnerstag", en = "Thursday" }
time = "10:40"
end = "11:10"
title = "Kodierte Keilschriftkurse: Eine Lern-App für Keilschriftzeichen"
person = "Anna Fischer"
description = "In diesem Vortrag möchte ich der Fragestellung nachgehen, wie eine Lern-App für sumerisch-akkadische Keilschrift aussehen kann. Diese Schrift ist eine logosyllabische, derer sich mehrere Völker bedient haben. Sie wurde im späten vierten Jahrtausend in Mesopotamien entwickelt und war von dort über 3000 Jahre in Gebrauch. Ziel meiner  App soll es sein, ein Mittel zu bieten, mit dem sich ihre Lesungen und Zeichenformen über verschiedene Epochen hinweg spielerisch lernen lassen.\n\nZusammensetzen wird die App sich aus zwei Komponenten: einer Sammlung an Zeichen mit ihren jeweiligen Entwicklungsstufen, Lautwerten und Logorammen, aus denen man sich Kartensätze zusammenstellen kann; und einer Reihe an Lernspielen, die das Verinnerlichen dieser Zeichen unterstützen. Ich verwende hierfür React Native, ein Framework für JavaScript. Als Datengrundlage dient die Oracc Sign List [1]. Die Anwendung umfasst bereits zwei Lernspiele: ein Verbindungs- und ein Lernspiel.\n\nBeginnen möchte ich den Vortrag mit einer kurzen Einführung in die Keilschrift, deren Besonderheiten und welche Vorteile aus einer speziell für sie entwickelte App gezogen werden können. Daraufhin werde ich den aktuellen Stand der Anwendung vorstellen. Abschließend beschäftigte ich mich damit, welche computerlinguistischen Methoden zur Lernunterstützung in der App eingebaut werden können.\n\n[1] https://oracc.museum.upenn.edu/osl/"
location = "Seminarraum 11"
color = "#00a0d7"

