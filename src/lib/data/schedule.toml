[[events]]
date = "2026-05-22"
day = { de = "Freitag", en = "Friday" }
time = "11:15"
end = "12:15"
title = "Inside the Transformer's Matrix: A Practical Guide to Mechanistic Interpretability"
person = "Prof. Dr. Artur Andrzejak"
description = "Transformer-based language models are everywhere, but what are they actually doing inside? Mechanistic Interpretability is the discipline trying to answer this rigorously, by decomposing model computations into human-understandable components: circuits, features, and subspaces. This talk tours the field from core methods and tools, through the regularity of documented transformer circuits, to formal frameworks for reasoning about what transformers can and cannot compute. Along the way we'll mention open challenges and discuss what self-directed study in this space looks like. We'll also touch on recent training-free interpretability work using SVD decompositions of MLP weight matrices — an approach that sidesteps costly proxy models while preserving weight fidelity. Accessible to anyone familiar with neural language models, the talk aims to give you with a map of the landscape and concrete starting points for further exploration."
location = "Konferenzraum 5/104"
color = "#5b2d90"

