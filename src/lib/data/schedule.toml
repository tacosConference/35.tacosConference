title = "Zwischen KI und Kundenprojekten: Computerlinguistik in der Praxis"
person = "Sophia Ackermann"
description = "Was machen Computerlinguist:innen eigentlich außerhalb der Forschung? Dieser Vortrag bietet Einblicke in den Arbeitsalltag bei berns language consulting, einem Düsseldorfer Expertenunternehmen für Sprachprozesse und -technologie. Aus erster Hand berichtet eine Computerlinguistin, wie vielfältig der Beruf im Unternehmenskontext ist: von der Analyse und Aufbereitung von Sprachdaten über die Evaluierung und Einführung von Tools bis hin zur Beratung von Kunden und der Implementierung maßgeschneiderter Lösungen. Anhand anonymisierter Beispiele aus realen Industrieprojekten wird veranschaulicht, wie Computerlinguistik konkret eingesetzt wird und welchen Mehrwert sie in unterschiedlichen Anwendungsfeldern schafft. Gleichzeitig werden aktuelle Entwicklungen und Herausforderungen im Markt aufgezeigt, insbesondere rund um KI, Large Language Models und die wachsende Bedeutung hochwertiger Sprachdaten.\nDer Vortrag richtet sich an Studierende, die sich für praxisnahe Einblicke und berufliche Perspektiven in der Computerlinguistik interessieren."
location = "Konferenzraum 5/104"
color = "#e67e22"

